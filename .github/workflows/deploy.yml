name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  # Permet de relancer un déploiement manuellement depuis l'onglet Actions,
  # sans devoir pousser un commit vide.
  workflow_dispatch:

# Deux déploiements en même temps sur la même queue pourraient s'écraser :
# on met le run précédent en attente plutôt que de l'annuler.
concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          corepack prepare --activate
          npm --version
          npm ci

      # @ngx-env/builder lit process.env au build : pas besoin de fichier .env,
      # les secrets exportés ici suffisent (voir src/environments/environment.ts).
      - name: Build (production)
        run: npx ng build
        env:
          NG_APP_SUPABASE_URL: ${{ secrets.NG_APP_SUPABASE_URL }}
          NG_APP_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NG_APP_SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sereno-dist
          path: dist/sereno/browser
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sereno-dist
          path: dist/sereno/browser

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sereno
          directory: dist/sereno/browser
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # Chaque déploiement a aussi une URL unique (hash) — c'est normal.
      # L'URL publique stable est toujours celle de production ci-dessous.
      - name: Production URL
        run: echo "https://sereno-2qj.pages.dev"
