<div
  class="frame"
  [class.fullscreen]="hideShell()"
  [class.has-header]="!hideShell() && !isRootTab()"
  [class.has-fab]="!hideShell() && showFab()"
  [class.has-nav]="!hideShell() && isRootTab()"
>
  @if (!hideShell()) {
    <app-side-nav class="side-nav" />
  }
  <main>
    @if (!hideShell() && !isRootTab()) {
      <app-back-header [title]="headerTitle()" />
    }
    <router-outlet />
  </main>
  @if (!hideShell() && isRootTab()) {
    <app-bottom-nav class="bottom-nav" />
  }
  @if (!hideShell() && showFab()) {
    <app-fab />
  }
</div>

<app-pwa-banner />

<div class="toasts" aria-live="polite">
  @for (toast of toasts.toasts(); track toast.id) {
    <div class="toast" [class.attention]="toast.tone === 'attention'">{{ toast.message }}</div>
  }
</div>
