<div class="frame">
  <app-side-nav class="side-nav" />
  <main>
    <router-outlet />
  </main>
  <app-bottom-nav class="bottom-nav" />
  @if (showSkyOverlay()) {
    <div class="sky-transition-layer" aria-hidden="true">
      <app-sereno-sky [progress]="themeProgress()" />
    </div>
  }
</div>

<app-pwa-banner />
<app-conversion-modal />

<div class="toasts" aria-live="polite">
  @for (toast of toasts.toasts(); track toast.id) {
    <div class="toast" [class.attention]="toast.tone === 'attention'">{{ toast.message }}</div>
  }
</div>
