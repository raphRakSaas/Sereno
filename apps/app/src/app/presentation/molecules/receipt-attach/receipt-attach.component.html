<div class="receipt-block">
  <div class="field-head">
    <label>Reçu</label>
    <span class="optional">— facultatif</span>
  </div>

  @if (receipts.error()) {
    <p class="notice">{{ receipts.error() }}</p>
  }
  @if (hint()) {
    <p class="notice">{{ hint() }}</p>
  }

  @if (receiptPreview(activeReceipt()); as previewUrl) {
    <div class="preview-card">
      <button type="button" class="thumb" (click)="openViewer()" aria-label="Agrandir le reçu">
        <img [src]="previewUrl" alt="Aperçu du reçu" />
      </button>
      <div class="preview-meta">
        <p class="status">Reçu attaché</p>
        <div class="preview-actions">
          <button type="button" class="link-btn" [disabled]="disabled()" (click)="openGalleryInput(galleryInput)">
            Remplacer
          </button>
          <button type="button" class="link-btn danger" [disabled]="disabled()" (click)="removeReceipt()">
            Supprimer
          </button>
        </div>
      </div>
    </div>
  } @else {
    <div class="actions-row">
      <button type="button" class="attach-btn" [disabled]="disabled()" (click)="openCameraInput(cameraInput)">
        <app-icon name="camera" [size]="18" />
        Prendre une photo
      </button>
      <button type="button" class="attach-btn ghost" [disabled]="disabled()" (click)="openGalleryInput(galleryInput)">
        <app-icon name="image" [size]="18" />
        Importer
      </button>
    </div>
  }

  <input
    #cameraInput
    type="file"
    accept="image/jpeg,image/png,image/webp,image/heic,image/heif"
    capture="environment"
    hidden
    (change)="onFileSelected($event)"
  />
  <input
    #galleryInput
    type="file"
    accept="image/jpeg,image/png,image/webp,image/heic,image/heif"
    hidden
    (change)="onFileSelected($event)"
  />

  @if (viewerOpen()) {
    <div class="viewer" role="dialog" aria-modal="true" aria-label="Reçu agrandi">
      <button type="button" class="viewer-close" (click)="closeViewer()" aria-label="Fermer">
        <app-icon name="close" [size]="20" />
      </button>
      @if (receiptPreview(activeReceipt()); as fullUrl) {
        <img [src]="fullUrl" alt="Reçu en plein écran" />
      }
    </div>
  }
</div>
