<div class="page">
  <p class="explain">Un virement déplace de l'argent entre tes comptes — ce n'est ni une dépense ni un revenu.</p>

  <form (ngSubmit)="save()">
    <label class="amount-field" for="amount">
      <input
        #amountInput
        id="amount"
        name="amount"
        type="text"
        inputmode="decimal"
        autocomplete="off"
        placeholder="0"
        [ngModel]="amountText()"
        (ngModelChange)="amountText.set($event)"
        class="amount"
      />
      <span class="euro">€</span>
    </label>

    @if (hint()) {
      <p class="notice">{{ hint() }}</p>
    }

    <app-numeric-keypad [value]="amountText()" (valueChange)="amountText.set($event)" />

    <div class="accounts">
      <button type="button" class="account-card" (click)="modal.set('from')">
        <span class="fine">Depuis</span>
        <span class="account-name">{{ accountName(fromAccountId()) }}</span>
      </button>
      <span class="arrow" aria-hidden="true">↓</span>
      <button type="button" class="account-card" (click)="modal.set('to')">
        <span class="fine">Vers</span>
        <span class="account-name">{{ accountName(toAccountId()) }}</span>
      </button>
    </div>

    <div class="field">
      <label for="date">Date</label>
      <input
        id="date"
        name="date"
        type="date"
        class="input"
        [ngModel]="date()"
        (ngModelChange)="date.set($event)"
      />
    </div>

    <div class="field">
      <label for="note">Note <span class="fine">(optionnel)</span></label>
      <input
        id="note"
        name="note"
        type="text"
        class="input"
        placeholder="Ex. Épargne mensuelle"
        [ngModel]="note()"
        (ngModelChange)="note.set($event)"
      />
    </div>

    <button type="button" class="row" (click)="modal.set('marker')">
      <span class="row-main">
        <span class="marker-dot" [style.--marker]="markerColor() ?? 'var(--line)'"></span>
        Marqueur <span class="fine">(optionnel)</span>
      </span>
      <app-icon name="chevron-right" [size]="16" />
    </button>

    <button type="submit" class="btn btn-primary btn-block" [disabled]="saving()">
      {{ editedId() ? 'Enregistrer' : 'Confirmer le virement' }}
    </button>
    @if (editedId()) {
      <button type="button" class="delete" (click)="remove()">
        {{ confirmingDelete() ? 'Confirmer la suppression ?' : 'Supprimer ce virement' }}
      </button>
    }
  </form>

  <app-bottom-sheet [open]="modal() === 'from'" label="Choisir le compte source" (closed)="modal.set(null)">
    <h2 class="modal-title">Depuis quel compte ?</h2>
    <app-account-picker [accounts]="fromOptions()" [selectedId]="fromAccountId()" (select)="setFromAccount($event)" />
  </app-bottom-sheet>

  <app-bottom-sheet [open]="modal() === 'to'" label="Choisir le compte destination" (closed)="modal.set(null)">
    <h2 class="modal-title">Vers quel compte ?</h2>
    <app-account-picker [accounts]="toOptions()" [selectedId]="toAccountId()" (select)="setToAccount($event)" />
  </app-bottom-sheet>

  <app-bottom-sheet [open]="modal() === 'marker'" label="Couleur du marqueur" (closed)="modal.set(null)">
    <h2 class="modal-title">Couleur du marqueur</h2>
    <app-marker-color-picker [selectedColor]="markerColor()" (colorSelected)="selectMarkerColor($event)" />
  </app-bottom-sheet>
</div>
